name: Deploy install script from .dotfiles

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: sarioah/.dotfiles
          token: ${{ secrets.PRIVATE_DOTFILES_PAT }}
          path: private

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: private/.pages

      - name: Deploy
        uses: actions/deploy-pages@v4
